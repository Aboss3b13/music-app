<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BeatForge Studio</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Splash Screen -->
<div id="splash-screen">
    <div class="splash-content">
        <div class="splash-waveform">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
        </div>
        <h1 class="splash-title">BeatForge<span>Studio</span></h1>
        <p class="splash-sub">Touch &bull; Create &bull; Produce</p>
        <button id="start-btn" class="glow-btn">TAP TO CREATE</button>
    </div>
</div>

<!-- Main App -->
<div id="app" class="hidden">

    <!-- Top Transport Bar -->
    <header id="transport">
        <button id="stop-btn" class="t-btn" aria-label="Stop">
            <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
        <button id="play-btn" class="t-btn play" aria-label="Play">
            <svg viewBox="0 0 24 24" class="ico-play"><polygon points="7,4 21,12 7,20"/></svg>
            <svg viewBox="0 0 24 24" class="ico-pause hidden"><rect x="5" y="4" width="5" height="16" rx="1"/><rect x="14" y="4" width="5" height="16" rx="1"/></svg>
        </button>
        <button id="record-btn" class="t-btn rec" aria-label="Record">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
        </button>
        <div class="bpm-box">
            <button class="bpm-adj" id="bpm-down">−</button>
            <input type="number" id="bpm-input" value="120" min="40" max="300">
            <button class="bpm-adj" id="bpm-up">+</button>
        </div>
        <div class="step-ind"><span id="cur-step">1</span>/<span id="tot-steps">16</span></div>
        <button id="metronome-btn" class="t-btn sm" aria-label="Metronome">♩</button>
        <button id="fx-toggle" class="t-btn sm" aria-label="FX">FX</button>
    </header>

    <!-- FX Drawer -->
    <div id="fx-panel" class="fx-panel hidden">
        <div class="fx-row">
            <div class="fx-item"><label>Reverb</label><input type="range" id="fx-reverb" min="0" max="100" value="20"><span id="fx-reverb-val">20</span></div>
            <div class="fx-item"><label>Delay</label><input type="range" id="fx-delay" min="0" max="100" value="0"><span id="fx-delay-val">0</span></div>
            <div class="fx-item"><label>Distort</label><input type="range" id="fx-distortion" min="0" max="100" value="0"><span id="fx-distortion-val">0</span></div>
        </div>
        <div class="fx-row">
            <div class="fx-item"><label>Filter</label><input type="range" id="fx-filter" min="100" max="20000" value="20000"><span id="fx-filter-val">20k</span></div>
            <div class="fx-item"><label>Swing</label><input type="range" id="swing-amount" min="0" max="100" value="0"><span id="swing-val">0</span></div>
            <div class="fx-item"><label>Master</label><input type="range" id="master-volume" min="0" max="100" value="80"><span id="master-vol-val">80</span></div>
        </div>
    </div>

    <!-- Content -->
    <div id="content">

        <!-- SEQUENCER -->
        <section id="sequencer-view" class="view active">
            <div class="seq-bar">
                <select id="pattern-preset" class="sel">
                    <option value="">Pattern…</option>
                    <optgroup label="Hip-Hop"><option value="hiphop-boom">Boom Bap</option><option value="hiphop-trap">Trap</option><option value="hiphop-lofi">Lo-Fi</option></optgroup>
                    <optgroup label="Electronic"><option value="edm-house">House</option><option value="edm-techno">Techno</option><option value="edm-dubstep">Dubstep</option><option value="edm-dnb">D&amp;B</option><option value="edm-trance">Trance</option></optgroup>
                    <optgroup label="World"><option value="reggaeton">Reggaeton</option><option value="afrobeats">Afrobeats</option><option value="rock">Rock</option><option value="jazz">Jazz</option></optgroup>
                </select>
                <div class="step-btns">
                    <button class="step-cnt active" data-steps="16">16</button>
                    <button class="step-cnt" data-steps="32">32</button>
                </div>
                <button id="clear-seq" class="sm-btn">Clear</button>
            </div>
            <div class="seq-scroll"><div id="seq-grid" class="seq-grid"></div></div>
        </section>

        <!-- PADS -->
        <section id="pads-view" class="view hidden">
            <div class="pads-bar">
                <div class="bank-scroll">
                    <button class="bank active" data-bank="drums">Drums</button>
                    <button class="bank" data-bank="bass">Bass</button>
                    <button class="bank" data-bank="synth">Synth</button>
                    <button class="bank" data-bank="nebula">Nebula</button>
                    <button class="bank" data-bank="808">808</button>
                    <button class="bank" data-bank="world">World</button>
                </div>
            </div>
            <div id="pad-grid" class="pad-grid"></div>
            <div class="pad-info"><span id="pad-name">Tap a pad</span></div>
        </section>

        <!-- KEYS -->
        <section id="keys-view" class="view hidden">
            <div class="keys-bar">
                <select id="keys-inst" class="sel">
                    <option value="piano">Piano</option>
                    <option value="epiano">E-Piano</option>
                    <option value="bass">Bass</option>
                    <option value="lead">Lead</option>
                    <option value="pad">Pad</option>
                    <option value="strings">Strings</option>
                    <option value="pluck">Pluck</option>
                    <option value="organ">Organ</option>
                    <option value="marimba">Marimba</option>
                    <option value="acid">Acid 303</option>
                    <option value="nebula">Nebula</option>
                </select>
                <div class="oct-ctrl">
                    <button id="oct-down" class="icon-btn">◀</button>
                    <span id="oct-disp">4</span>
                    <button id="oct-up" class="icon-btn">▶</button>
                </div>
            </div>
            <div id="piano-kb" class="piano-kb"></div>
        </section>

        <!-- TOUCH INSTRUMENTS -->
        <section id="touch-view" class="view hidden">
            <div class="touch-bar">
                <div class="touch-modes">
                    <button class="tmode active" data-mode="xy">XY Pad</button>
                    <button class="tmode" data-mode="ribbon">Ribbon</button>
                    <button class="tmode" data-mode="strings">Strings</button>
                    <button class="tmode" data-mode="orbital">Orbital</button>
                </div>
                <select id="touch-inst" class="sel sel-sm">
                    <option value="lead">Lead</option>
                    <option value="pad">Pad</option>
                    <option value="nebula">Nebula</option>
                    <option value="bass">Bass</option>
                    <option value="pluck">Pluck</option>
                    <option value="acid">Acid</option>
                </select>
                <select id="touch-scale" class="sel sel-sm">
                    <option value="chromatic">Chromatic</option>
                    <option value="major">Major</option>
                    <option value="minor">Minor</option>
                    <option value="pentatonic">Penta</option>
                    <option value="blues">Blues</option>
                    <option value="arabic">Arabic</option>
                </select>
            </div>
            <div id="touch-surface" class="touch-surface">
                <canvas id="touch-canvas"></canvas>
            </div>
        </section>

        <!-- MIX -->
        <section id="mix-view" class="view hidden">
            <div class="mix-bar">
                <button class="mix-tab active" data-mode="tracks">Tracks</button>
                <button class="mix-tab" data-mode="mixer">Mixer</button>
                <button id="export-btn" class="sm-btn accent">Export</button>
            </div>
            <div id="mt-area" class="mt-area active">
                <div id="mt-tracks"></div>
                <div id="mt-empty" class="mt-empty">
                    <div class="mt-empty-icon">🎙️</div>
                    <p>Hit <b>Record</b> then play any instrument</p>
                    <p class="sub">Your performance appears here as a track</p>
                </div>
            </div>
            <div id="mixer-area" class="mixer-area hidden">
                <div id="mixer-ch"></div>
            </div>
        </section>

    </div>

    <!-- Bottom Nav -->
    <nav id="nav">
        <button class="nav-btn active" data-view="sequencer"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Beats</span></button>
        <button class="nav-btn" data-view="pads"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="9" height="9" rx="2"/><rect x="13" y="2" width="9" height="9" rx="2"/><rect x="2" y="13" width="9" height="9" rx="2"/><rect x="13" y="13" width="9" height="9" rx="2"/></svg><span>Pads</span></button>
        <button class="nav-btn" data-view="keys"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="3" height="16" rx="1"/><rect x="7" y="4" width="3" height="16" rx="1"/><rect x="11" y="4" width="3" height="16" rx="1"/><rect x="15" y="4" width="3" height="16" rx="1"/><rect x="19" y="4" width="3" height="16" rx="1"/></svg><span>Keys</span></button>
        <button class="nav-btn" data-view="touch"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3"/></svg><span>Touch</span></button>
        <button class="nav-btn" data-view="mix"><svg viewBox="0 0 24 24"><rect x="4" y="12" width="3" height="9" rx="1"/><rect x="9" y="7" width="3" height="14" rx="1"/><rect x="14" y="10" width="3" height="11" rx="1"/><rect x="19" y="4" width="3" height="17" rx="1"/></svg><span>Mix</span></button>
    </nav>

</div>

<!-- Export Dialog -->
<div id="export-dialog" class="dialog-overlay hidden">
    <div class="dialog">
        <h2>Export Track</h2>
        <div class="fields">
            <div class="field"><label>Format</label><select id="export-format" class="sel"><option value="wav">WAV</option></select></div>
            <div class="field"><label>Loops</label><input type="number" id="export-loops" value="4" min="1" max="32" class="inp"></div>
            <div class="field"><label>Name</label><input type="text" id="export-filename" value="beatforge-track" class="inp"></div>
        </div>
        <div id="export-progress" class="progress hidden">
            <div class="pbar"><div id="progress-fill" class="pfill"></div></div>
            <span id="progress-text">Rendering…</span>
        </div>
        <div class="dlg-btns">
            <button id="export-cancel" class="btn ghost">Cancel</button>
            <button id="export-confirm" class="btn primary">Export</button>
        </div>
    </div>
</div>

<script src="js/audio-engine.js"></script>
<script src="js/instruments.js"></script>
<script src="js/patterns.js"></script>
<script src="js/sequencer.js"></script>
<script src="js/touch-instruments.js"></script>
<script src="js/multitrack.js"></script>
<script src="js/mixer.js"></script>
<script src="js/recorder.js"></script>
<script src="js/app.js"></script>

</body>
</html>
